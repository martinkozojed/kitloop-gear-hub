[build]
  command = "export VITE_COMMIT_SHA=${COMMIT_SHA:-${COMMIT_REF:-unknown}} && export VITE_BUILD_TIME=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\") && npm run build"
  publish = "dist"

[context.production]
  command = "export VITE_COMMIT_SHA=${COMMIT_SHA:-${COMMIT_REF:-unknown}} && export VITE_BUILD_TIME=$(date -u +\"%Y-%m-%dT%H:%M:%SZ\") && npm run build"

[context.production.environment]
  VITE_ENABLE_DEMO = "false"
  # MVP Feature Flags (all false by default)
  VITE_ENABLE_ANALYTICS = "false"
  VITE_ENABLE_CRM = "false"
  VITE_ENABLE_ACCOUNTS = "false"
  VITE_ENABLE_MAINTENANCE = "false"
  VITE_ENABLE_CALENDAR = "false"
  VITE_ENABLE_MARKETPLACE = "false"

[build.environment]
  NODE_VERSION = "20"

# All redirects live here. Do not add public/_redirects (Netlify merges it first and would override domain 301s; _redirects also does not support comments).
# Order: domain 301s first (force = true), then static rewrites, then SPA fallback.

# 1) Domain redirects — must run before any path-based rule so kitloop.cz etc. 301 to kitloop.co
[[redirects]]
  from = "https://kitloop.cz/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.kitloop.cz/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://kitloop.cz/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.kitloop.cz/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.kitloop.co/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://kitloop.co/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.kitloop.co/*"
  to = "https://kitloop.co/:splat"
  status = 301
  force = true

# 2) Static rewrites (200 = serve file; no force — only needed for redirects overriding existing routes)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# 3) /.well-known/* — Apple/Google verifications, security.txt, etc.; must not be eaten by SPA fallback
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

# 4) SPA fallback — last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
for = "/*"
  [headers.values]
  Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' https://cdn.gpteng.co https://js.stripe.com; connect-src 'self' https://*.supabase.co https://api.stripe.com https://r.stripe.com https://*.sentry.io https://*.ingest.sentry.io http://127.0.0.1:54321 ws://127.0.0.1:54321; frame-src 'self' https://js.stripe.com; frame-ancestors 'self'; base-uri 'self';"
  Referrer-Policy = "no-referrer"
  Permissions-Policy = "geolocation=(), camera=(), microphone=()"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "SAMEORIGIN"

# /.well-known/* — avoid caching so Apple/Google verifications and security.txt are picked up quickly
[[headers]]
  for = "/.well-known/*"
  [headers.values]
  Cache-Control = "no-store"
  # Content-Type is inferred by Netlify from file extension; override per file in Netlify UI if needed

# Optional: cache for robots/sitemap (tune if you change them often — lower max-age or drop these blocks)
[[headers]]
  for = "/robots.txt"
  [headers.values]
  Cache-Control = "public, max-age=3600"
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
  Cache-Control = "public, max-age=3600"

# Context: Protect outbound requests to Supabase, Stripe, and Sentry (M1 hardening).
# To enable Stripe Elements later, extend script-src/frame-src with https://js.stripe.com
# Example variant: script-src 'self' https://js.stripe.com; frame-src 'self' https://js.stripe.com
# Keep connect-src ready for https://r.stripe.com (Stripe) and https://*.ingest.sentry.io (Sentry ingest).
