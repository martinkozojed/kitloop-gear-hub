name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full git history for diff
      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref || 'main' }} --depth=1
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint changed files only
        run: |
          BASE_REF="origin/${{ github.event.pull_request.base.ref || 'main' }}"
          echo "Linting against base: $BASE_REF"
          bash ./scripts/lint_changed.sh "$BASE_REF"

  migration_guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Needed for git diff to main
      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref || 'main' }} --depth=1
      - name: Data-loss Guard Linter
        run: |
          chmod +x scripts/prevent-data-loss.sh
          BASE_REF="origin/${{ github.event.pull_request.base.ref || 'main' }}"
          bash scripts/prevent-data-loss.sh "$BASE_REF"

  drift_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: UI Drift Scan
        id: drift
        # Enforce UI Drift hard fail!
        continue-on-error: false
        run: |
          chmod +x scripts/ui-drift-scan.sh
          bash scripts/ui-drift-scan.sh

          # Run the new microcopy scan on specific files
          npx tsx scripts/microcopy-drift-scan.ts
      - name: Print Drift Report
        if: always()
        run: cat docs/ui_drift_raw.txt || echo "No report found"
      - name: Upload Drift Report
        uses: actions/upload-artifact@v7
        with:
          name: ui-drift-report
          path: docs/ui_drift_raw.txt

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck

  test_deno:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.5.6"
      - name: Deno version
        run: deno --version
      - name: Cache dependencies (no lock in CI to avoid npm specifiers from package.json)
        run: |
          rm -rf ~/.cache/deno
          deno cache --no-lock --no-npm --allow-import=deno.land,esm.sh,legacy.esm.sh \
            supabase/functions/reserve_gear/index.ts \
            supabase/functions/confirm_reservation/index.ts \
            supabase/functions/cleanup_reservation_holds/index.ts \
            supabase/functions/create_payment_intent/index.ts \
            supabase/functions/stripe_webhook/index.ts \
            supabase/functions/notify-dispatcher/index.ts \
            supabase/functions/admin_action/index.ts \
            supabase/functions/submit_request/index.ts \
            supabase/functions/submit_pilot_request/index.ts \
            supabase/functions/e2e_harness/index.ts \
            supabase/functions/upload_ticket/index.ts \
            supabase/functions/upload_ticket/handler.ts \
            supabase/functions/tests/hold_cleanup_test.ts
      - name: Run reserve_gear unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: deno test --no-lock supabase/functions/reserve_gear --allow-env --allow-read --allow-import=deno.land,esm.sh,legacy.esm.sh
      - name: Run confirm_reservation unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          STRIPE_SECRET_KEY: "${{ secrets.STRIPE_SECRET_KEY }}"
        run: deno test --no-lock --quiet supabase/functions/confirm_reservation --allow-env --allow-read --allow-import=deno.land,esm.sh,legacy.esm.sh
      - name: Run cleanup_reservation_holds unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
        run: deno test --no-lock --quiet supabase/functions/cleanup_reservation_holds --allow-import=deno.land,esm.sh,legacy.esm.sh || echo "cleanup tests skipped"
      - name: Run create_payment_intent unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          STRIPE_SECRET_KEY: "${{ secrets.STRIPE_SECRET_KEY }}"
        run: deno test --no-lock --quiet supabase/functions/create_payment_intent --allow-import=deno.land,esm.sh,legacy.esm.sh || echo "create_payment_intent tests skipped"
      - name: Run stripe_webhook unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          STRIPE_SECRET_KEY: "${{ secrets.STRIPE_SECRET_KEY }}"
        run: deno test --no-lock --quiet supabase/functions/stripe_webhook --allow-import=deno.land,esm.sh,legacy.esm.sh
      - name: Run notify-dispatcher unit tests
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
        run: deno test --no-lock --quiet supabase/functions/notify-dispatcher --allow-import=deno.land,esm.sh,legacy.esm.sh
      # Note: Removed "Verify lockfile unchanged" step - esm.sh CDN returns inconsistent hashes across regions

  test_rls:
    # RLS regression tests: start local Supabase, apply migrations, run pgTAP tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase
        run: supabase start -x edge-runtime,imgproxy,inbucket,postgrest,storage-api,realtime,studio,logflare
      - name: Run RLS regression tests (pgTAP)
        run: supabase test db

  test_db:
    # Nightly/manual only, and only if DB URL secret is present.
    # Run on Schedule, Manual Dispatch, OR Push to Main
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Run Supabase DB tests
        env:
          SUPABASE_DB_URL: "${{ secrets.SUPABASE_DB_URL }}"
        run: |
          if [[ -z "${SUPABASE_DB_URL}" ]]; then
            echo "SUPABASE_DB_URL not set; skipping db test."
            exit 0
          fi
          # Sanitize and ensure schema
          CLEAN_DB_URL=$(echo "$SUPABASE_DB_URL" | tr -d '\n' | xargs)
          if [[ "$CLEAN_DB_URL" != postgresql://* ]]; then
            CLEAN_DB_URL="postgresql://$CLEAN_DB_URL"
          fi
          supabase db test --db-url "$CLEAN_DB_URL"
      - name: Apply Supabase migrations (main only)
        env:
          SUPABASE_DB_URL: "${{ secrets.SUPABASE_DB_URL }}"
        run: |
          if [[ -z "${SUPABASE_DB_URL}" ]]; then
            echo "SUPABASE_DB_URL not set; skipping migrations."
            exit 0
          fi
          CLEAN_DB_URL=$(echo "$SUPABASE_DB_URL" | tr -d '\n' | xargs)
          if [[ "$CLEAN_DB_URL" != postgresql://* ]]; then
            CLEAN_DB_URL="postgresql://$CLEAN_DB_URL"
          fi
          supabase db push --db-url "$CLEAN_DB_URL"

  build:
    runs-on: ubuntu-latest
    needs: [typecheck, test_deno]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload dist for Netlify
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  netlify-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Netlify deploy preview
        env:
          NETLIFY_AUTH_TOKEN: "${{ secrets.NETLIFY_AUTH_TOKEN }}"
          NETLIFY_SITE_ID: "${{ secrets.NETLIFY_SITE_ID }}"
        run: npx netlify deploy --dir=dist
